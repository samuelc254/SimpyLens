name: Publish to TestPyPI

on:
  push:
    tags:
      - "v*rc*"

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  tests:
    uses: ./.github/workflows/tests.yml

  publish:
    needs: tests
    runs-on: ubuntu-latest
    environment: testpypi

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Validate tag commit is on develop
        run: |
          git fetch origin develop --depth=1
          if git merge-base --is-ancestor "$GITHUB_SHA" "origin/develop"; then
            echo "Tag commit is contained in origin/develop."
          else
            echo "::error::Tag commit $GITHUB_SHA is not contained in origin/develop."
            exit 1
          fi

      - name: Validate tag is RC and matches project version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import os
          import pathlib
          import tomllib

          tag = os.environ["TAG_NAME"]

          def normalize_version(value: str) -> str:
              value = value.strip()
              return value[1:] if value.lower().startswith("v") else value
          
          # Ensure it's an RC tag
          if "rc" not in tag.lower():
              raise SystemExit(
                  f"Tag '{tag}' is not a release candidate. RC tags must contain 'rc'."
              )
          
          tag_version = normalize_version(tag)

          pyproject = pathlib.Path("pyproject.toml")
          data = tomllib.loads(pyproject.read_text(encoding="utf-8"))
          project_version = normalize_version(str(data["project"]["version"]))

          if tag_version != project_version:
              raise SystemExit(
                  f"Tag version '{tag_version}' does not match pyproject version '{project_version}'."
              )

          print(f"Tag version '{tag_version}' matches pyproject version '{project_version}'.")
          PY

      - name: Install build tools
        run: python -m pip install --upgrade build

      - name: Build distributions
        run: python -m build

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
